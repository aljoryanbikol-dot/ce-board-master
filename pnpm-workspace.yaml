# CE Board Master — Turborepo Monorepo Workspace Configuration
# Defines which directories are workspace packages.
# All apps and shared packages are discovered automatically.
packages:
  - "apps/*"
  - "packages/*"

# Dependencies approved to run their install/build scripts (pnpm v9+).
# Listing a package here is what "approves" it — pnpm uses a list, not key:true.
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - "@scarf/scarf"
  - argon2
  - esbuild
  - msgpackr-extract
  - prisma
  - sharp
