# =============================================================================
# CE Board Master — CI Pipeline
# =============================================================================
# Runs on every pull request and push to main branch.
#
# Pipeline stages (run in parallel where possible):
# 1. lint      — ESLint + Prettier check (affected packages only)
# 2. typecheck — TypeScript type checking (affected packages only)
# 3. test      — Unit tests with coverage (affected packages only)
# 4. build     — Production build verification (affected packages only)
# 5. security  — npm audit + Trivy Docker image scan
#
# "Affected" means Turborepo detects which packages changed since last run.
# Unchanged packages use cached results (< 30 second CI for small PRs).
#
# Deployment (main branch only) handled by separate deploy.yml workflow.
#
# Architecture reference: Phase 3B, Section 29 (CI/CD Pipeline)
# Constitution reference: Article XIV §14 (Testing Standards)
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# Cancel in-progress runs on the same PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ── Lint & Format Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # For Turborepo change detection

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint (affected packages)
        run: pnpm lint

      - name: Format check
        run: pnpm exec prettier --check "apps/**/*.ts" "packages/**/*.ts"

  # ── TypeScript Check ─────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Generate Prisma client
        run: pnpm --filter @ce-board-master/api db:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: TypeScript check (affected)
        run: pnpm typecheck

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ce-board-master/api db:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Run unit tests with coverage
        run: pnpm test
        env:
          NODE_ENV: test
          # Minimum env values for config validation
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          DATABASE_POOL_URL: postgresql://test:test@localhost:5432/test
          DATABASE_ANALYTICS_URL: postgresql://test:test@localhost:5432/test
          JWT_PRIVATE_KEY: "test-key"
          JWT_PUBLIC_KEY: "test-key"
          GOOGLE_CLIENT_ID: "test"
          GOOGLE_CLIENT_SECRET: "test"
          GOOGLE_CALLBACK_URL: "http://localhost:3001/callback"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_S3_BUCKET: "test"
          CDN_DOMAIN: "https://cdn.test.ph"
          STRIPE_SECRET_KEY: "sk_test_dummy"
          STRIPE_WEBHOOK_SECRET: "whsec_dummy"
          STRIPE_PRICE_BASIC_MONTHLY: "price_test"
          STRIPE_PRICE_BASIC_ANNUAL: "price_test"
          STRIPE_PRICE_PRO_MONTHLY: "price_test"
          STRIPE_PRICE_PRO_ANNUAL: "price_test"
          PAYMONGO_SECRET_KEY: "sk_test_dummy"
          PAYMONGO_PUBLIC_KEY: "pk_test_dummy"
          PAYMONGO_WEBHOOK_SECRET: "dummy"
          XENDIT_SECRET_KEY: "xnd_test_dummy"
          XENDIT_WEBHOOK_TOKEN: "xnd_wh_dummy"
          PAYMENT_DEFAULT_PROVIDER: "mock"
          ANTHROPIC_API_KEY: "sk-ant-dummy"
          RESEND_API_KEY: "re_dummy"
          EMAIL_FROM: "noreply@test.com"
          ARGON2_PEPPER: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          COOKIE_SECRET: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          APP_URL: "http://localhost:3001"
          FRONTEND_URL: "http://localhost:3000"
          ADMIN_URL: "http://localhost:3002"
          CORS_ORIGINS: "http://localhost:3000"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7

  # ── End-to-End Tests ─────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ce-board-master/api db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Apply migrations
        run: pnpm --filter @ce-board-master/api db:migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Seed database (roles, permissions, plans)
        run: pnpm --filter @ce-board-master/api db:seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run e2e tests
        run: pnpm test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          DATABASE_POOL_URL: postgresql://test:test@localhost:5432/test
          DATABASE_ANALYTICS_URL: postgresql://test:test@localhost:5432/test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_PRIVATE_KEY: "test-key"
          JWT_PUBLIC_KEY: "test-key"
          GOOGLE_CLIENT_ID: "test"
          GOOGLE_CLIENT_SECRET: "test"
          GOOGLE_CALLBACK_URL: "http://localhost:3001/callback"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_S3_BUCKET: "test"
          CDN_DOMAIN: "https://cdn.test.ph"
          STRIPE_SECRET_KEY: "sk_test_dummy"
          STRIPE_WEBHOOK_SECRET: "whsec_dummy"
          STRIPE_PRICE_BASIC_MONTHLY: "price_test"
          STRIPE_PRICE_BASIC_ANNUAL: "price_test"
          STRIPE_PRICE_PRO_MONTHLY: "price_test"
          STRIPE_PRICE_PRO_ANNUAL: "price_test"
          PAYMONGO_SECRET_KEY: "sk_test_dummy"
          PAYMONGO_PUBLIC_KEY: "pk_test_dummy"
          PAYMONGO_WEBHOOK_SECRET: "dummy"
          XENDIT_SECRET_KEY: "xnd_test_dummy"
          XENDIT_WEBHOOK_TOKEN: "xnd_wh_dummy"
          PAYMENT_DEFAULT_PROVIDER: "mock"
          ANTHROPIC_API_KEY: "sk-ant-dummy"
          RESEND_API_KEY: "re_dummy"
          EMAIL_FROM: "noreply@test.com"
          ARGON2_PEPPER: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          COOKIE_SECRET: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          APP_URL: "http://localhost:3001"
          FRONTEND_URL: "http://localhost:3000"
          ADMIN_URL: "http://localhost:3002"
          CORS_ORIGINS: "http://localhost:3000"

  # ── Build Verification ───────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Generate Prisma client
        run: pnpm --filter @ce-board-master/api db:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build all packages
        run: pnpm build

  # ── Security Audit ────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Dependency vulnerability audit
      # High severity CVEs fail the build (per Constitution Article XI §11)
      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: false

      # Docker image vulnerability scan (only on main branch)
      - name: Build Docker image for scanning
        if: github.ref == 'refs/heads/main'
        run: docker build -f infrastructure/docker/Dockerfile.api -t ce-board-master-api:scan .

      - name: Scan Docker image with Trivy
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ce-board-master-api:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ── Prisma Migration Check ───────────────────────────────────────────────────
  prisma:
    name: Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Validate schema syntax without database connection
      - name: Validate Prisma schema
        run: pnpm --filter @ce-board-master/api exec prisma validate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      # Check schema is in sync with migrations
      - name: Check migration drift
        run: |
          echo "Schema validation passed. Migration drift check requires DB connection."
          echo "Full migration validation runs in the E2E pipeline."
