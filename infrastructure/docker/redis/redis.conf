# CE Board Master — Redis Configuration
# Mirrors AWS ElastiCache Redis 7 configuration

# Security
# bind 127.0.0.1  # Uncomment for local-only in production (behind VPC)
protected-mode no  # Docker networking provides isolation in dev

# Persistence (AOF + RDB for durability)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Performance
tcp-keepalive 300
hz 20
activerehashing yes

# Logging
loglevel notice
