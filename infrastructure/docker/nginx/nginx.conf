# =============================================================================
# CE Board Master — nginx (production reverse proxy + TLS termination)
# =============================================================================
# Routes:
#   /api/*  → API service  (NestJS, :3001)
#   /*      → Web service   (Next.js, :3000)
# Adds edge rate limiting, security headers, gzip, and an HTTP→HTTPS redirect.
# Certs are mounted at /etc/nginx/certs (fullchain.pem + privkey.pem).
# =============================================================================

worker_processes auto;
events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;
  server_tokens off;

  # Logs (JSON-ish for log shippers).
  log_format json escape=json '{"time":"$time_iso8601","remote":"$remote_addr",'
    '"method":"$request_method","uri":"$request_uri","status":$status,'
    '"bytes":$body_bytes_sent,"rt":$request_time,"ua":"$http_user_agent"}';
  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log warn;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Edge rate limiting (defense in depth; the API enforces its own limits too).
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
  limit_req_status 429;

  upstream web_upstream { server web:3000; keepalive 32; }
  upstream api_upstream { server api:3001; keepalive 32; }

  # ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    location /healthz { return 200 'ok'; add_header Content-Type text/plain; }
    location / { return 301 https://$host$request_uri; }
  }

  # ── HTTPS ───────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (the app sets its own CSP; these are belt-and-suspenders).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

    # API — stricter limit on auth routes.
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://api_upstream;
      include /etc/nginx/proxy_params.conf;
    }
    location /api/ {
      limit_req zone=general burst=50 nodelay;
      proxy_pass http://api_upstream;
      include /etc/nginx/proxy_params.conf;
    }

    # Everything else → Next.js.
    location / {
      limit_req zone=general burst=50 nodelay;
      proxy_pass http://web_upstream;
      include /etc/nginx/proxy_params.conf;
    }
  }
}
