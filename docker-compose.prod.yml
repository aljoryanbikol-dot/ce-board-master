# =============================================================================
# CE Board Master — Docker Compose (Production)
# =============================================================================
# A self-hostable production topology: api + web + postgres + redis behind an
# nginx TLS terminator. For managed cloud (Vercel + RDS + ElastiCache) use the
# deployment guide instead — this compose targets single-host / VPS / staging.
#
# Secrets come from an env file (NOT committed). Copy infrastructure/production/
# .env.production.example → .env.production and fill it in:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d
#
# Every service has a healthcheck; api waits for postgres+redis to be healthy.
# =============================================================================

name: ceboardmaster-prod

services:
  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.utf8"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits: { cpus: '2.0', memory: 2G }

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    volumes:
      - redisdata:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits: { cpus: '1.0', memory: 768M }

  # ── API (NestJS) ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    restart: always
    env_file: [.env.production]
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUN_MIGRATIONS_ON_START: "true"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [backend, frontend]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 2
      resources:
        limits: { cpus: '1.0', memory: 1G }

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/backend}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-CE Board Master}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      # Server-side rewrite target so the browser's /api/backend/* reaches the API.
      API_PROXY_TARGET: http://api:3001
    depends_on:
      api: { condition: service_healthy }
    networks: [frontend]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      resources:
        limits: { cpus: '1.0', memory: 1G }

  # ── nginx (TLS termination + reverse proxy) ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      web: { condition: service_healthy }
      api: { condition: service_healthy }
    networks: [frontend]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:

networks:
  backend:
  frontend:
